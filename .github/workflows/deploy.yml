name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build Docker Image & Deploy via Coolify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Lowercase image name (Docker registry requires lowercase)
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 3. Set up Docker Buildx (enables caching + multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Build and push the Docker image
      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Trigger Coolify to pull the new image and redeploy
      - name: Trigger Coolify deployment
        run: |
          curl -fsSL \
            --retry 3 \
            --retry-delay 5 \
            -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      # 7. Summary
      - name: Deployment summary
        run: |
          echo "✅ Image pushed: ${{ env.IMAGE }}:${{ github.sha }}"
          echo "🚀 Coolify deployment triggered"
